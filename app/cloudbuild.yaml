# Cloud Build config for the agents-web image (the shared web environment that
# fronts all five agents). Build context is the REPO ROOT so the image can copy
# both app/ and projects/ (the persona files); the Dockerfile lives at
# app/Dockerfile.
#
# Usage (from repo root):
#   IMAGE="us-central1-docker.pkg.dev/samantha-493919/agents/agents-web:$(git rev-parse --short HEAD)"
#   gcloud builds submit . --project=samantha-493919 --region=us-central1 \
#     --config=app/cloudbuild.yaml --substitutions=_IMAGE="$IMAGE"
#
# This only builds + pushes the image. Deploy it with the
# `gcloud run deploy agents-web ...` command in app/BUILD.md.
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "app/Dockerfile", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
images: ["${_IMAGE}"]
# Regional builds / non-default service accounts require an explicit logging mode.
options:
  logging: CLOUD_LOGGING_ONLY
