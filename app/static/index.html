<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Bryan O'Neill Gillis — Agents</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    :root {
      --bg: #0b0d12; --panel: #14171f; --panel-2: #1c2030; --line: #262a39;
      --text: #e8ecf3; --muted: #8a93a6;
      --samantha: #5fb3ff; --nora: #ffb85f; --sloane: #d18fff;
      --audra: #5fd7a4; --vin: #ff6f6f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 16px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    body { display: flex; flex-direction: column; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    header { padding: 14px 18px 10px; border-bottom: 1px solid var(--line); }
    header h1 { font-size: 14px; margin: 0; color: var(--muted); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    header p { font-size: 12px; margin: 4px 0 0; color: var(--muted); }
    .agents { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; border-bottom: 1px solid var(--line); }
    .agent {
      flex: 0 0 auto; padding: 10px 14px; border-radius: 999px; border: 1px solid var(--line);
      background: var(--panel); color: var(--text); cursor: pointer; font-size: 14px;
      display: flex; gap: 8px; align-items: center; transition: transform .08s ease, border-color .15s;
    }
    .agent:active { transform: scale(.97); }
    .agent .dot { width: 8px; height: 8px; border-radius: 50%; }
    .agent[data-name="samantha"] .dot { background: var(--samantha); }
    .agent[data-name="nora"] .dot { background: var(--nora); }
    .agent[data-name="sloane"] .dot { background: var(--sloane); }
    .agent[data-name="audra"] .dot { background: var(--audra); }
    .agent[data-name="vin"] .dot { background: var(--vin); }
    .agent.active { border-color: currentColor; background: var(--panel-2); }
    .agent.active[data-name="samantha"] { color: var(--samantha); }
    .agent.active[data-name="nora"] { color: var(--nora); }
    .agent.active[data-name="sloane"] { color: var(--sloane); }
    .agent.active[data-name="audra"] { color: var(--audra); }
    .agent.active[data-name="vin"] { color: var(--vin); }
    main { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 14px 4px; }
    .msg { max-width: 100%; padding: 11px 14px; border-radius: 14px; margin: 6px 0; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { background: #1e2a44; align-self: flex-end; }
    .msg.model { background: var(--panel); border: 1px solid var(--line); }
    .msg .who { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .thread { display: flex; flex-direction: column; gap: 2px; }
    .typing { color: var(--muted); font-style: italic; padding: 8px 14px; }
    footer { border-top: 1px solid var(--line); padding: 10px 12px 14px; background: var(--bg); }
    .composer { display: flex; gap: 8px; }
    textarea {
      flex: 1; resize: none; min-height: 44px; max-height: 160px; padding: 11px 12px;
      background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 12px;
      font: inherit;
    }
    textarea:focus { outline: none; border-color: var(--samantha); }
    button.send {
      background: var(--samantha); color: #0b0d12; border: 0; border-radius: 12px;
      padding: 0 18px; font-weight: 600; cursor: pointer; min-width: 64px;
    }
    button.send:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 14px 0; }
    .row button { background: none; border: 0; color: var(--muted); font: inherit; cursor: pointer; padding: 4px 0; }
    .row button:hover { color: var(--text); }
    .err { background: #3a1d1d; border: 1px solid #6e2a2a; color: #ffb4b4; }
  </style>
</head>
<body>
  <header>
    <h1>Agent Team</h1>
    <p id="meta">Loading…</p>
  </header>
  <div class="agents" id="agents"></div>
  <div class="row">
    <span id="active-label" style="font-size:12px;color:var(--muted);"></span>
    <button id="reset">/reset</button>
  </div>
  <main><div class="thread" id="thread"></div></main>
  <footer>
    <form class="composer" id="composer">
      <textarea id="input" placeholder="Type a task…" rows="1" autocomplete="off"></textarea>
      <button type="submit" class="send" id="send">Send</button>
    </form>
  </footer>

  <script>
    const AGENT_INFO = {
      samantha: "Google APIs — Gmail / Calendar / Drive",
      nora:     "Ops — websites / Make.com / lead intake",
      sloane:   "Content — drafts, brand voice, social",
      audra:    "Accounting — invoicing, expenses, reconciliation",
      vin:      "Site Infra — Cloudflare + GitHub",
    };
    const state = { agent: "samantha", history: [], busy: false };
    const thread = document.getElementById("thread");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const composer = document.getElementById("composer");
    const meta = document.getElementById("meta");
    const activeLabel = document.getElementById("active-label");
    const resetBtn = document.getElementById("reset");
    const agentBar = document.getElementById("agents");

    function setAgent(name) {
      state.agent = name;
      state.history = [];
      thread.innerHTML = "";
      activeLabel.textContent = `${name} — ${AGENT_INFO[name] || ""}`;
      [...agentBar.querySelectorAll(".agent")].forEach(b => {
        b.classList.toggle("active", b.dataset.name === name);
      });
      input.focus();
    }

    function pushMsg(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "model");
      const who = document.createElement("div");
      who.className = "who";
      who.textContent = role === "user" ? "you" : state.agent;
      const body = document.createElement("div");
      body.textContent = text;
      div.appendChild(who); div.appendChild(body);
      thread.appendChild(div);
      thread.scrollTop = thread.scrollHeight;
      return div;
    }

    async function send(text) {
      if (!text.trim() || state.busy) return;
      state.busy = true; sendBtn.disabled = true;
      pushMsg("user", text);
      const typing = document.createElement("div");
      typing.className = "typing"; typing.textContent = state.agent + " is thinking…";
      thread.appendChild(typing); thread.scrollTop = thread.scrollHeight;
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agent: state.agent, message: text, history: state.history }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status + ": " + (await res.text()));
        const data = await res.json();
        typing.remove();
        pushMsg("model", data.reply);
        state.history.push({ role: "user", text });
        state.history.push({ role: "model", text: data.reply });
      } catch (e) {
        typing.remove();
        const m = pushMsg("model", "Error: " + e.message);
        m.classList.add("err");
      } finally {
        state.busy = false; sendBtn.disabled = false;
        input.focus();
      }
    }

    composer.addEventListener("submit", e => {
      e.preventDefault();
      const text = input.value;
      input.value = ""; input.style.height = "auto";
      send(text);
    });
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); composer.requestSubmit(); }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(160, input.scrollHeight) + "px";
    });
    resetBtn.addEventListener("click", () => {
      state.history = []; thread.innerHTML = "";
      input.focus();
    });

    // Bootstrap
    fetch("/api/agents").then(r => r.json()).then(data => {
      meta.textContent = `${data.model} · ${data.project}`;
      data.agents.forEach(name => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "agent";
        btn.dataset.name = name;
        btn.innerHTML = `<span class="dot"></span>${name[0].toUpperCase() + name.slice(1)}`;
        btn.addEventListener("click", () => setAgent(name));
        agentBar.appendChild(btn);
      });
      setAgent("samantha");
    });

    // PWA — register service worker (best-effort)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
